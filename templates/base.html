{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>
        {% block title %}
        Property Hub
        {% endblock %}
    </title>

    <meta name="description"
          content="{% block meta_description %}Buy, Sell & Rent Properties{% endblock %}">

    <meta name="keywords"
          content="{% block meta_keywords %}real estate, plot, villa, flat{% endblock %}">

    <meta name="author" content="Property Hub">

    <link rel="canonical"
          href="{{ request.build_absolute_uri }}">

    <!-- Open Graph -->

    <meta property="og:title"
          content="{% block og_title %}Property Hub{% endblock %}">

    <meta property="og:description"
          content="{% block og_description %}Find Your Dream Property{% endblock %}">

    <meta property="og:image"
          content="{% block og_image %}{% static 'images/og-image.jpg' %}{% endblock %}">

    <meta property="og:type"
          content="website">

    <!-- Favicon -->

    <link rel="icon"
          href="{% static 'images/favicon.png' %}">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
          rel="stylesheet">

    <!-- Swiper -->

    <link href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
          rel="stylesheet">

    <!-- AOS -->

    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css"
          rel="stylesheet">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Custom CSS -->

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

    {% block extra_css %}
    {% endblock %}

</head>

<body>

<!-- Loader -->

<div id="loader">
    <div class="spinner-border text-primary"></div>
</div>

<!-- Navbar -->

{% include 'partials/navbar.html' %}

<!-- Main Content -->

<main>

    {% block content %}
    {% endblock %}

</main>

<!-- Footer -->

{% include 'partials/footer.html' %}

<!-- WhatsApp -->

<a href="https://wa.me/919999999999"
   target="_blank"
   class="whatsapp-btn">

    <i class="fab fa-whatsapp"></i>

</a>

<!-- Back To Top -->

<button id="backToTop">

    <i class="fas fa-arrow-up"></i>

</button>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Swiper -->

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<!-- AOS -->

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<!-- Custom JS -->

<script src="{% static 'js/main.js' %}"></script>

<script>

    AOS.init({
        duration: 1000,
        once: true
    });

    window.addEventListener("load", () => {
        document.getElementById("loader").style.display = "none";
    });

    const topBtn = document.getElementById("backToTop");

    window.addEventListener("scroll", () => {

        if(window.scrollY > 300){
            topBtn.style.display = "block";
        }else{
            topBtn.style.display = "none";
        }

    });

    topBtn.addEventListener("click", () => {

        window.scrollTo({
            top:0,
            behavior:'smooth'
        });

    });

</script>

{% block extra_js %}
{% endblock %}

</body>
</html>
