{% extends 'base.html' %}

{% block title %}
Register | PropertyHub
{% endblock %}

{% block content %}

<section class="auth-section">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-6">

                <div class="auth-card">

                    <div class="text-center mb-4">

                        <h2 class="fw-bold">

                            Create Account

                        </h2>

                        <p class="text-muted">

                            Start posting your properties

                        </p>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label>

                                    First Name

                                </label>

                                <input type="text"
                                       name="first_name"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>

                                    Last Name

                                </label>

                                <input type="text"
                                       name="last_name"
                                       class="form-control">

                            </div>

                        </div>

                        <div class="mb-3">

                            <label>

                                Username

                            </label>

                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label>

                                Email

                            </label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label>

                                Phone

                            </label>

                            <input type="text"
                                   name="phone"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>

                                User Type

                            </label>

                            <select class="form-select"
                                    name="user_type">

                                <option value="buyer">

                                    Buyer

                                </option>

                                <option value="owner">

                                    Owner

                                </option>

                                <option value="agent">

                                    Agent

                                </option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label>

                                Password

                            </label>

                            <input type="password"
                                   name="password1"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label>

                                Confirm Password

                            </label>

                            <input type="password"
                                   name="password2"
                                   class="form-control"
                                   required>

                        </div>

                        <button class="btn btn-primary w-100">

                            Create Account

                        </button>

                    </form>

                    <div class="text-center mt-4">

                        Already have an account?

                        <a href="{% url 'login' %}">

                            Login

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
