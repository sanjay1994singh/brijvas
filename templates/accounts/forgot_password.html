{% extends 'base.html' %}

{% block title %}
Forgot Password
{% endblock %}

{% block content %}

<section class="auth-section">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-5">

                <div class="auth-card">

                    <h3 class="text-center mb-4">

                        Reset Password

                    </h3>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label>Email</label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   required>

                        </div>

                        <button class="btn btn-primary w-100">

                            Send Reset Link

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
