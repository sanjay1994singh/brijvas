{% extends 'base.html' %}
{% load static %}

{% block title %}
Login | PropertyHub
{% endblock %}

{% block content %}

<section class="auth-section">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-5">

                <div class="auth-card">

                    <div class="text-center mb-4">

                        <h2 class="fw-bold">

                            Welcome Back

                        </h2>

                        <p class="text-muted">

                            Login to manage your properties

                        </p>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Username / Email

                            </label>

                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Password

                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="d-flex justify-content-between mb-3">

                            <div>

                                <input type="checkbox">

                                Remember Me

                            </div>

                            <a href="{% url 'forgot_password' %}">

                                Forgot Password?

                            </a>

                        </div>

                        <button class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                    <hr>

                    <a href="{% url 'social:begin' 'google-oauth2' %}"
                       class="btn btn-danger w-100">

                        <i class="fab fa-google"></i>

                        Continue With Google

                    </a>

                    <div class="text-center mt-4">

                        Don't have an account?

                        <a href="{% url 'register' %}">

                            Register

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
