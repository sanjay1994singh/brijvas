<div class="col-lg-4 col-md-6 mb-4">

    <article class="property-card h-100">

        <div class="property-image position-relative">

            <a href="{% url 'property_detail' property.slug %}">

                <img src="{{ property.featured_image.url }}"
                     class="img-fluid"
                     width="600"
                     height="420"
                     alt="{{ property.title }}"
                     loading="lazy">

            </a>

            {% if property.is_featured %}
            <span class="badge bg-danger featured-badge">
                Featured
            </span>
            {% endif %}

            <span class="badge bg-primary purpose-badge">
                {{ property.get_purpose_display }}
            </span>

        </div>

        <div class="property-content p-3">

            <h5 class="property-title">

                <a href="{% url 'property_detail' property.slug %}"
                   class="text-dark">

                    {{ property.title|truncatechars:58 }}

                </a>

            </h5>

            <p class="text-muted mb-2">

                <i class="fa-solid fa-location-dot"></i>

                {{ property.city.name }}

            </p>

            <h4 class="text-primary fw-bold mb-3">

                Rs {{ property.price }}

            </h4>

            <div class="property-info d-flex justify-content-between">

                <span>
                    <i class="fa-solid fa-expand"></i>
                    {{ property.display_area_summary }}
                </span>

                <span>
                    <i class="fa-solid fa-bed"></i>
                    {{ property.bedrooms }}
                </span>

                <span>
                    <i class="fa-solid fa-bath"></i>
                    {{ property.bathrooms }}
                </span>

            </div>

            <hr>

            <div class="property-actions d-flex justify-content-between gap-2">

                <a href="{% url 'property_detail' property.slug %}"
                   class="btn btn-primary btn-sm">

                    View Details

                </a>

                <a href="https://wa.me/918279408396?text=Hi%20I%20am%20interested%20in%20{{ property.title|urlencode }}"
                   target="_blank"
                   class="btn btn-success btn-sm">

                    WhatsApp

                </a>

            </div>

        </div>

    </article>

</div>
